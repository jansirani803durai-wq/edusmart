# Q55-Q59: Render Blueprint with PostgreSQL
services:
  - type: web
    name: edutrack-sms
    runtime: python
    plan: free
    buildCommand: bash build.sh
    startCommand: gunicorn edutrack.wsgi:application
    healthCheckPath: /
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://*.onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: edutrack-db
          property: connectionString

databases:
  - name: edutrack-db
    plan: free
    databaseName: edutrack
    user: edutrack
