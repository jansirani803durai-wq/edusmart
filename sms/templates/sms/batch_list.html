{% extends 'sms/base.html' %}{% block content %}<section class="card"><div class="head"><h1>Batch List</h1><a class="btn" href="{% url 'create_batch' %}">Create Batch</a></div><div class="grid">{% for b in batches %}<article><h3>{{ b.name }}</h3><p>Start: {{ b.start_date }}</p><p>{{ b.student_total }} students</p><a class="btn" href="{% url 'take_attendance' b.id %}">Take Attendance</a> <a class="btn alt" href="{% url 'attendance_report' b.id %}">Report</a></article>{% empty %}<p>No batches.</p>{% endfor %}</div></section>{% endblock %}
