{% extends 'sms/base.html' %}{% block content %}<section class="card"><h1>Take Attendance - {{ batch.name }}</h1>{% if already_recorded %}<div class="msg error">Attendance already recorded for {{ attendance_date }}.</div>{% else %}<form method="post">{% csrf_token %}<p><label>Date</label><input type="date" name="attendance_date" value="{{ attendance_date|date:'Y-m-d' }}" required></p><div class="table"><table><tr><th>Student</th><th>Status</th></tr>{% for s in students %}<tr><td>{{ s.full_name }}</td><td><select name="status_{{ s.id }}" required><option value="">Select</option>{% for v,l in status_choices %}<option value="{{ v }}">{{ l }}</option>{% endfor %}</select></td></tr>{% endfor %}</table></div><button class="btn">Save Attendance</button></form>{% endif %}</section>{% endblock %}
