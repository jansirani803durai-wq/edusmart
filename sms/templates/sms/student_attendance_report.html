{% extends 'sms/base.html' %}{% block content %}<section class="card"><h1>{{ student.full_name }} Attendance</h1><section class="stats small"><div><b>{{ summary.present }}</b><span>Present</span></div><div><b>{{ summary.absent }}</b><span>Absent</span></div><div><b>{{ summary.late }}</b><span>Late</span></div></section><div class="table"><table><tr><th>Date</th><th>Status</th></tr>{% for r in records %}<tr><td>{{ r.date }}</td><td><span class="{{ r.status|lower }}">{{ r.status }}</span></td></tr>{% empty %}<tr><td colspan="2">No attendance records.</td></tr>{% endfor %}</table></div></section>{% endblock %}
